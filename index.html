<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Elastic Elf Face</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            color: #eee;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #instructions h3 { margin: 0 0 5px 0; font-size: 16px; }
        #instructions p { margin: 0; font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="instructions">
        <h3>Elastic Elf Face</h3>
        <p>Interactive: Click & Drag areas to stretch and crumple skin.</p>
        <p>Eyebrows, Mouth, Nose, Cheeks are interactive.</p>
    </div>

    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec2 a_position; // Position of the mesh vertex
        attribute vec2 a_texCoord; // Original texture coordinates
        attribute float a_compression; // Compression value from physics

        varying vec2 v_texCoord;
        varying float v_compression;

        void main() {
            // Normalize vertex position to [-1, 1] screen space, assuming canvas matches image aspect ratio
            gl_Position = vec4(a_position, 0.0, 1.0);
            v_texCoord = a_texCoord;
            v_compression = a_compression;
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        uniform sampler2D u_image;
        varying vec2 v_texCoord;
        varying float v_compression;

        void main() {
            vec4 color = texture2D(u_image, v_texCoord);

            // Simulate shadows and highlights based on local compression
            // Points that bunch (compression < 0) get darker, points that stretch get lighter.
            float intensity = 1.0 + v_compression * 0.4;
            color.rgb *= intensity;

            gl_FragColor = color;
        }
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        if (!gl) { alert('WebGL not supported'); }

        const CONFIG = {
            gridX: 60, // Grid horizontal resolution
            gridY: 80, // Grid vertical resolution (more detailed on face)
            spring_k: 0.15, // Stiffer springs for overall shape
            spring_k_landmark: 0.05, // Softer springs for interactive landmarks
            damping: 0.95, // Energy loss
            interactionRadius: 0.04, // Percentage of image width for interaction
            dragForceScale: 5.0, // Strength of the user drag
        };

        const imageSource = "./Gemini_Generated_Image_rnsobqrnsobqrnso.png";
 
        // Placeholder for real image base64 data for performance.
        const actualImageDataPlaceholder = imageSource;

        let imageWidth = 0;
        let imageHeight = 0;
        let program = null;
        let imageTexture = null;
        let positionsBuffer, texCoordsBuffer, compressionBuffer, indicesBuffer;
        let grid = []; // 2D array of {x, y, vx, vy, ax, ay, mass, isLandmark, originalX, originalY}
        let springs = []; // Array of {m1_index, m2_index, restLength, k}
        let isMouseDown = false;
        let mouseX = -1, mouseY = -1;
        let activeInteractions = []; // Points currently under drag influence

        const landmarks = [
            // Internal landmark approximations for a 60x80 grid:
            // (gridX, gridY) coordinates
            {type: 'left_eyebrow', points: [ {x:18, y:15}, {x:23, y:14}, {x:28, y:15} ]},
            {type: 'right_eyebrow', points: [ {x:32, y:15}, {x:37, y:14}, {x:42, y:15} ]},
            {type: 'left_eye_rigid', points: [ {x:20, y:28}, {x:22, y:28}, {x:24, y:28}, {x:20, y:30}, {x:22, y:30}, {x:24, y:30} ]}, // Rigid area around pupils
            {type: 'right_eye_rigid', points: [ {x:36, y:28}, {x:38, y:28}, {x:40, y:28}, {x:36, y:30}, {x:38, y:30}, {x:40, y:30} ]},
            {type: 'nose_bridge', points: [ {x:30, y:25}, {x:30, y:28}, {x:30, y:31} ]},
            {type: 'nose_tip', points: [ {x:30, y:40} ]},
            {type: 'mouth_rigid', points: [ {x:30, y:52}, {x:30, y:55}, {x:27, y:53.5}, {x:33, y:53.5} ]}, // Mouth body, relatively rigid
            {type: 'left_mouth_corner', points: [ {x:22, y:52} ]},
            {type: 'right_mouth_corner', points: [ {x:38, y:52} ]},
            {type: 'left_cheek', points: [ {x:15, y:40} ]},
            {type: 'right_cheek', points: [ {x:45, y:40} ]},
            {type: 'chin', points: [ {x:30, y:65} ]}
        ];

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('An error occurred compiling the shaders:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        function initWebGL() {
            const vs = createShader(gl, gl.VERTEX_SHADER, document.getElementById('vertex-shader').text);
            const fs = createShader(gl, gl.FRAGMENT_SHADER, document.getElementById('fragment-shader').text);
            program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);
            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Unable to initialize the shader program:', gl.getProgramInfoLog(program));
            }
            gl.useProgram(program);

            // Set up image texture
            imageTexture = gl.createTexture();
            const image = new Image();
            image.onload = function() {
                imageWidth = image.width;
                imageHeight = image.height;
                initGrid(imageWidth, imageHeight);
                
                // Initialize physics buffers
                positionsBuffer = gl.createBuffer();
                texCoordsBuffer = gl.createBuffer();
                compressionBuffer = gl.createBuffer();
                indicesBuffer = gl.createBuffer();

                const { texCoords, indices } = generateMeshData();
                
                gl.bindBuffer(gl.ARRAY_BUFFER, texCoordsBuffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(texCoords), gl.STATIC_DRAW);
                
                gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indicesBuffer);
                gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);

                gl.bindTexture(gl.TEXTURE_2D, imageTexture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, image);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

                updateCanvasSize();
                requestAnimationFrame(loop);
            };
            image.src = actualImageDataPlaceholder;
        }

        function initGrid(width, height) {
            const ratio = width / height;
            const aspectX = ratio > 1 ? 1 : ratio;
            const aspectY = ratio > 1 ? 1/ratio : 1;

            // Define rigid landmarks explicitly
            let rigidPoints = new Set();
            landmarks.forEach(group => {
                if (group.type.includes('rigid')) {
                    group.points.forEach(p => rigidPoints.add(`${p.x}_${p.y}`));
                }
            });

            for (let y = 0; y <= CONFIG.gridY; y++) {
                grid[y] = [];
                for (let x = 0; x <= CONFIG.gridX; x++) {
                    const normX = x / CONFIG.gridX;
                    const normY = y / CONFIG.gridY;
                    
                    // In normalized screen space [-1, 1], preserving aspect ratio.
                    const initialX = (normX - 0.5) * 2 * aspectX;
                    const initialY = (0.5 - normY) * 2 * aspectY;

                    grid[y][x] = {
                        x: initialX,
                        y: initialY,
                        vx: 0,
                        vy: 0,
                        ax: 0,
                        ay: 0,
                        mass: 1.0,
                        originalX: initialX,
                        originalY: initialY,
                        originalTexCoord: [normX, normY],
                        landmarkType: null,
                        spring_k: CONFIG.spring_k
                    };

                    // Check if it's a landmark, or rigid point
                    if (rigidPoints.has(`${x}_${y}`)) {
                        grid[y][x].mass = 1000.0; // Make rigid points virtually immovable
                    }

                    // Assign types and customized k
                    landmarks.forEach(group => {
                        group.points.forEach(p => {
                            if (Math.round(p.x) === x && Math.round(p.y) === y) {
                                grid[y][x].landmarkType = group.type;
                                grid[y][x].spring_k = group.type.includes('rigid') ? CONFIG.spring_k * 5 : CONFIG.spring_k_landmark;
                            }
                        });
                    });
                }
            }

            // Create springs (connecting adjacent points)
            for (let y = 0; y <= CONFIG.gridY; y++) {
                for (let x = 0; x <= CONFIG.gridX; x++) {
                    const m1 = grid[y][x];
                    
                    // Connect right
                    if (x < CONFIG.gridX) {
                        const m2 = grid[y][x+1];
                        springs.push(createSpring(m1, m2));
                    }
                    // Connect down
                    if (y < CONFIG.gridY) {
                        const m2 = grid[y+1][x];
                        springs.push(createSpring(m1, m2));
                    }
                    // Connect diagonal (for shear resistance)
                    if (x < CONFIG.gridX && y < CONFIG.gridY) {
                        const m2 = grid[y+1][x+1];
                        springs.push(createSpring(m1, m2));
                    }
                    // Connect other diagonal
                    if (x > 0 && y < CONFIG.gridY) {
                        const m2 = grid[y+1][x-1];
                        springs.push(createSpring(m1, m2));
                    }
                }
            }
        }

        function createSpring(m1, m2) {
            const dx = m1.originalX - m2.originalX;
            const dy = m1.originalY - m2.originalY;
            const restLength = Math.sqrt(dx * dx + dy * dy);
            // Use the landmark-customized stiffness if both are landmarks, or average if only one
            const k = (m1.spring_k + m2.spring_k) / 2;
            return { m1, m2, restLength, k };
        }

        function generateMeshData() {
            const texCoords = [];
            const indices = [];
            for (let y = 0; y <= CONFIG.gridY; y++) {
                for (let x = 0; x <= CONFIG.gridX; x++) {
                    texCoords.push(...grid[y][x].originalTexCoord);
                    
                    if (x < CONFIG.gridX && y < CONFIG.gridY) {
                        const idx = y * (CONFIG.gridX + 1) + x;
                        const nextIdx = (y + 1) * (CONFIG.gridX + 1) + x;
                        
                        indices.push(idx, nextIdx, idx + 1);
                        indices.push(idx + 1, nextIdx, nextIdx + 1);
                    }
                }
            }
            return { texCoords, indices };
        }

        function updateCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function screenToNormalizedCoord(sx, sy) {
            const ratio = imageWidth / imageHeight;
            const aspectX = ratio > 1 ? 1 : ratio;
            const aspectY = ratio > 1 ? 1/ratio : 1;
            
            // Assuming canvas maintains image's aspect ratio via CSS or similar setup (we'll enforce it here)
            let drawWidth = canvas.width;
            let drawHeight = drawWidth / ratio;

            if (drawHeight > canvas.height) {
                drawHeight = canvas.height;
                drawWidth = drawHeight * ratio;
            }

            const offsetX = (canvas.width - drawWidth) / 2;
            const offsetY = (canvas.height - drawHeight) / 2;

            const normX = (sx - offsetX) / drawWidth;
            const normY = (sy - offsetY) / drawHeight;

            // In normalized screen space [-1, 1], preserving aspect ratio.
            const initialX = (normX - 0.5) * 2 * aspectX;
            const initialY = (0.5 - normY) * 2 * aspectY;
            
            return { x: initialX, y: initialY };
        }

        function loop() {
            updatePhysics();
            render();
            requestAnimationFrame(loop);
        }

        function updatePhysics() {
            // Calculate forces for each mass
            for (let y = 0; y <= CONFIG.gridY; y++) {
                for (let x = 0; x <= CONFIG.gridX; x++) {
                    const mass = grid[y][x];
                    
                    // Hooke's law: Pull back to original position
                    const dx = mass.x - mass.originalX;
                    const dy = mass.y - mass.originalY;
                    mass.ax = -mass.spring_k * 50 * dx / mass.mass; // Restoring force is much stronger
                    mass.ay = -mass.spring_k * 50 * dy / mass.mass;
                    
                    // Reset tension for compression calculation
                    mass.tension = 0;
                }
            }

            // Spring forces (connecting masses)
            springs.forEach(spring => {
                const dx = spring.m1.x - spring.m2.x;
                const dy = spring.m1.y - spring.m2.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist === 0) return;

                const forceScalar = -spring.k * (dist - spring.restLength);
                const fx = (dx / dist) * forceScalar;
                const fy = (dy / dist) * forceScalar;
                
                spring.m1.ax += fx / spring.m1.mass;
                spring.m1.ay += fy / spring.m1.mass;
                spring.m2.ax -= fx / spring.m2.mass;
                spring.m2.ay -= fy / spring.m2.mass;
                
                // Track tension/compression for depth effect
                const tension_dx = spring.m1.originalTexCoord[0] - spring.m2.originalTexCoord[0];
                const tension_dy = spring.m1.originalTexCoord[1] - spring.m2.originalTexCoord[1];
                const rest_dist = Math.sqrt(tension_dx * tension_dx + tension_dy * tension_dy);
                const current_tension = (dist / rest_dist) - 1.0;
                spring.m1.tension += current_tension;
                spring.m2.tension += current_tension;
            });

            // Update mouse interaction point
            let targetInteractionX = null, targetInteractionY = null;
            if (isMouseDown) {
                activeInteractions.forEach(point => {
                    const mass = grid[point.y][point.x];
                    // Interaction only on customizable landmarks
                    if (mass.landmarkType && !mass.landmarkType.includes('rigid')) {
                        // User's pull
                        mass.ax += point.dx * CONFIG.dragForceScale;
                        mass.ay += point.dy * CONFIG.dragForceScale;
                    }
                });
            }

            // Integrate and update positions
            for (let y = 0; y <= CONFIG.gridY; y++) {
                for (let x = 0; x <= CONFIG.gridX; x++) {
                    const mass = grid[y][x];
                    if (mass.mass > 100) continue; // Rigid points don't move
                    
                    mass.vx = (mass.vx + mass.ax * 0.5) * CONFIG.damping;
                    mass.vy = (mass.vy + mass.ay * 0.5) * CONFIG.damping;
                    mass.x += mass.vx;
                    mass.y += mass.vy;
                }
            }
        }

        function render() {
            gl.clearColor(0.06, 0.06, 0.06, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            const positions = [];
            const compressions = [];
            for (let y = 0; y <= CONFIG.gridY; y++) {
                for (let x = 0; x <= CONFIG.gridX; x++) {
                    const mass = grid[y][x];
                    positions.push(mass.x, mass.y);
                    
                    // Simple average compression calculation from accumulated tension
                    // Negative tension is bunching/crumpling
                    compressions.push(mass.tension / 8.0); 
                }
            }

            gl.bindBuffer(gl.ARRAY_BUFFER, positionsBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
            const positionLoc = gl.getAttribLocation(program, 'a_position');
            gl.enableVertexAttribArray(positionLoc);
            gl.vertexAttribPointer(positionLoc, 2, gl.FLOAT, false, 0, 0);

            const texCoordLoc = gl.getAttribLocation(program, 'a_texCoord');
            gl.enableVertexAttribArray(texCoordLoc);
            gl.vertexAttribPointer(texCoordLoc, 2, gl.FLOAT, false, 0, 0);

            gl.bindBuffer(gl.ARRAY_BUFFER, compressionBuffer);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(compressions), gl.DYNAMIC_DRAW);
            const compressionLoc = gl.getAttribLocation(program, 'a_compression');
            gl.enableVertexAttribArray(compressionLoc);
            gl.vertexAttribPointer(compressionLoc, 1, gl.FLOAT, false, 0, 0);

            const numIndices = CONFIG.gridX * CONFIG.gridY * 6;
            gl.drawElements(gl.TRIANGLES, numIndices, gl.UNSIGNED_SHORT, 0);
        }

        // --- Interaction Handlers ---
        let lastInteractionPoint = null;

        function startInteraction(x, y) {
            isMouseDown = true;
            mouseX = x;
            mouseY = y;
            const normCoords = screenToNormalizedCoord(x, y);
            const interactionX = normCoords.x;
            const interactionY = normCoords.y;
            lastInteractionPoint = { x: interactionX, y: interactionY };
            
            activeInteractions = [];
            const ratio = imageWidth / imageHeight;
            const screenRadius = CONFIG.interactionRadi
